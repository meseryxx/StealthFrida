name: Build Custom Frida Android ARM64 (venv isolated)

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FRIDA_VERSION: "16.6.1"
      ANDROID_NDK_VERSION: "25.2.9519653"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------
      # SYSTEM PACKAGES ONLY (NO PIP HERE)
      # -----------------------------
      - name: Install system dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            python3 \
            python3-dev \
            python3.10-dev \
            libpython3.10-dev \
            build-essential \
            ninja-build \
            meson \
            pkg-config \
            flex \
            bison \
            curl \
            wget \
            unzip \
            tar \
            libtool \
            autoconf \
            automake

      # -----------------------------
      # CREATE ISOLATED VENV
      # -----------------------------
      - name: Create Python virtual environment
        run: |
          python3 -m venv frida-venv
          source frida-venv/bin/activate

          python -m pip install --upgrade pip setuptools wheel
          python -m pip install meson ninja

          echo "VENV_PATH=$PWD/frida-venv" >> $GITHUB_ENV

      # -----------------------------
      # USE VENV FOR ALL BUILD STEPS
      # -----------------------------
      - name: Activate venv globally for job
        run: |
          echo "$VENV_PATH/bin" >> $GITHUB_PATH

      # -----------------------------
      # JAVA + ANDROID SDK
      # -----------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Set NDK Path
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # -----------------------------
      # VERIFY PYTHON (CRITICAL FIX FOR pyconfig.h)
      # -----------------------------
      - name: Verify Python headers
        run: |
          python -c "import sysconfig; print(sysconfig.get_paths()['include'])"
          ls $(python -c "import sysconfig; print(sysconfig.get_paths()['include'])")/pyconfig.h

      # -----------------------------
      # CLEAN BUILD CACHE
      # -----------------------------
      - name: Clean build directories
        run: |
          rm -rf frida/build
          rm -rf frida/subprojects/*/build
          rm -rf ~/.cache/meson || true

      # -----------------------------
      # BUILD
      # -----------------------------
      - name: Run build script
        run: |
          chmod +x build.sh
          ./build.sh

      # -----------------------------
      # ARTIFACTS
      # -----------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frida-build-output
          path: |
            frida/build/
            frida/subprojects/frida-python/dist/*.whl
          if-no-files-found: warn

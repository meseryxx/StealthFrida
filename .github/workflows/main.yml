name: Build Custom Frida Android ARM64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FRIDA_VERSION: "16.6.1"
      ANDROID_NDK_VERSION: "25.2.9519653"
      PYTHON: python3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ---------------------------
      # SYSTEM DEPENDENCIES (FIXED)
      # ---------------------------
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-setuptools \
            python3-wheel \
            python3-dev \
            python3.10-dev \
            libpython3.10-dev \
            ninja-build \
            meson \
            pkg-config \
            build-essential \
            flex \
            bison \
            curl \
            wget \
            unzip \
            tar \
            ruby-full \
            libtool \
            autoconf \
            automake \
            texinfo \
            gcc-multilib \
            g++-multilib \
            libc6-dev-i386 \
            python3-venv

          python3 -m pip install --upgrade pip setuptools wheel meson ninja

      # ---------------------------
      # FORCE CORRECT PYTHON PATH
      # ---------------------------
      - name: Fix Python include paths
        run: |
          echo "Python include dir:"
          python3 -c "import sysconfig; print(sysconfig.get_paths()['include'])"

          echo "Python config:"
          python3-config --includes || true

          sudo ln -sf /usr/include/python3.10 /usr/include/python3 || true

      # ---------------------------
      # JAVA + ANDROID
      # ---------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Set NDK Path
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # ---------------------------
      # CLEAN BUILD (IMPORTANT FIX)
      # ---------------------------
      - name: Clean old build artifacts
        run: |
          rm -rf frida/build
          rm -rf frida/subprojects/*/build
          rm -rf ~/.cache/meson || true

      # ---------------------------
      # BUILD
      # ---------------------------
      - name: Make build script executable
        run: chmod +x build.sh

      - name: Run build script
        env:
          PYTHONPATH: /usr/lib/python3/dist-packages
        run: |
          export CC=/usr/bin/gcc
          export CXX=/usr/bin/g++

          ./build.sh

      # ---------------------------
      # ARTIFACTS
      # ---------------------------
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frida-build-output
          path: |
            frida/build/
            frida/subprojects/frida-python/dist/*.whl
          if-no-files-found: warn

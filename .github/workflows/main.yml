name: Build Custom Frida Android ARM64

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      FRIDA_VERSION: "16.6.1"
      ANDROID_NDK_VERSION: "25.2.9519653"
      PYTHONNOUSERSITE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # SYSTEM DEPENDENCIES
      # -------------------------
      - name: Install dependencies
        run: |
          sudo apt update

          sudo apt install -y \
            git \
            python3 \
            python3-pip \
            python3-dev \
            python3.10-dev \
            libpython3.10-dev \
            build-essential \
            ninja-build \
            meson \
            pkg-config \
            flex \
            bison \
            curl \
            wget \
            unzip \
            tar \
            libtool \
            autoconf \
            automake

          python3 -m pip install --upgrade pip setuptools wheel meson ninja

      # -------------------------
      # HARD PYTHON FIX (IMPORTANT)
      # -------------------------
      - name: Force correct Python environment
        run: |
          PY_INC=$(python3 -c "from sysconfig import get_paths; print(get_paths()['include'])")
          PY_LIB=$(python3 -c "import sysconfig; print(sysconfig.get_config_var('LIBDIR'))")

          echo "Python include: $PY_INC"
          echo "Python lib: $PY_LIB"

          echo "PYTHON_INCLUDE_DIR=$PY_INC" >> $GITHUB_ENV
          echo "PYTHON_LIB_DIR=$PY_LIB" >> $GITHUB_ENV

          # IMPORTANT: force correct config path
          echo "Python config header check:"
          ls $PY_INC/pyconfig.h || true

      # -------------------------
      # JAVA + ANDROID
      # -------------------------
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;${ANDROID_NDK_VERSION}"

      - name: Set NDK Path
        run: |
          echo "ANDROID_NDK_ROOT=$ANDROID_SDK_ROOT/ndk/${ANDROID_NDK_VERSION}" >> $GITHUB_ENV

      # -------------------------
      # FORCE MESON TO NOT USE BROKEN PYTHON
      # -------------------------
      - name: Clean Meson + Frida cache
        run: |
          rm -rf frida/build
          rm -rf frida/subprojects/*/build
          rm -rf ~/.cache/meson || true

      # -------------------------
      # PATCH BUILD SCRIPT
      # -------------------------
      - name: Fix build script environment
        run: |
          chmod +x build.sh

          # FORCE correct Python include path into compiler flags
          sed -i "1i export CFLAGS=\"-I$PYTHON_INCLUDE_DIR\"" build.sh

      # -------------------------
      # BUILD
      # -------------------------
      - name: Build Frida
        env:
          CC: gcc
          CXX: g++
          PYTHON: python3
          PYTHONPATH: /usr/lib/python3/dist-packages
          MESON_PYTHON_PATH: /usr/bin/python3
        run: |
          ./build.sh

      # -------------------------
      # ARTIFACTS
      # -------------------------
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frida-build
          path: |
            frida/build/
            frida/subprojects/frida-python/dist/*.whl
          if-no-files-found: warn
